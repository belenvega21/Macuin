<!DOCTYPE html>
<html class="dark" lang="es">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Macuin Autopartes - Registro</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
darkMode: "class",
theme:{
extend:{
colors:{
primary:"#ffd900",
dark:"#0a0a0a",
card:"#111111",
red:"#e63946"
},
fontFamily:{
display:["Inter","sans-serif"]
}
}
}
}
</script>

<style>
body{
font-family:'Inter',sans-serif;
background:#0a0a0a;
}
</style>

</head>

<body class="min-h-screen flex flex-col text-white">

<!-- HEADER -->

<header class="w-full px-10 py-4 flex justify-between items-center border-b border-gray-800">

<div class="flex items-center gap-3">

<span class="material-symbols-outlined text-yellow-400 text-3xl">
settings_input_component
</span>

<h1 class="text-xl font-bold uppercase">
Macuin <span class="text-red-600">Autopartes</span>
</h1>

</div>

<a href="/" class="bg-yellow-400 text-black px-4 py-2 rounded-lg font-bold">
Iniciar sesión
</a>

</header>


<!-- REGISTRO -->

<main class="flex-1 flex items-center justify-center p-8">

<div class="w-full max-w-xl bg-card p-10 rounded-xl border border-gray-800 shadow-2xl">

<div class="text-center mb-8">

<h2 class="text-3xl font-bold">Registro de Nueva Cuenta</h2>

<p class="text-gray-400 text-sm mt-2">
Portal de clientes Macuin
</p>

</div>

<form method="POST" action="/registro" class="space-y-6">

<!-- Nombre -->

<div>

<label class="text-sm text-gray-300">
Nombre del negocio
</label>

<input
type="text"
name="nombre"
required
placeholder="Ej: Refaccionaria Vega"
class="w-full mt-2 px-4 py-3 bg-black border border-gray-700 rounded-lg focus:ring-2 focus:ring-yellow-400"
/>

</div>


<!-- Email -->

<div>

<label class="text-sm text-gray-300">
Correo electrónico
</label>

<input
type="email"
name="email"
required
placeholder="cliente@email.com"
class="w-full mt-2 px-4 py-3 bg-black border border-gray-700 rounded-lg focus:ring-2 focus:ring-yellow-400"
/>

</div>


<!-- Teléfono -->

<div>

<label class="text-sm text-gray-300">
Teléfono
</label>

<input
type="tel"
name="telefono"
required
placeholder="4421234567"
class="w-full mt-2 px-4 py-3 bg-black border border-gray-700 rounded-lg focus:ring-2 focus:ring-yellow-400"
/>

</div>


<!-- Password -->

<div class="grid grid-cols-2 gap-4">

<div>

<label class="text-sm text-gray-300">
Contraseña
</label>

<input
type="password"
name="password"
required
class="w-full mt-2 px-4 py-3 bg-black border border-gray-700 rounded-lg focus:ring-2 focus:ring-yellow-400"
/>

</div>

<div>

<label class="text-sm text-gray-300">
Confirmar contraseña
</label>

<input
type="password"
name="confirmar"
required
class="w-full mt-2 px-4 py-3 bg-black border border-gray-700 rounded-lg focus:ring-2 focus:ring-yellow-400"
/>

</div>

</div>


<!-- BOTÓN -->

<button
type="submit"
class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-3 rounded-lg transition">

CREAR MI CUENTA

</button>

</form>


<div class="text-center mt-6 text-sm">

<a href="/" class="text-yellow-400 font-bold">
¿Ya tienes cuenta? Inicia sesión
</a>

</div>

</div>

</main>

</body>
</html>
