{% extends "base.html" %}

{% block content %}

<style>
.card{
    background:#1a1a1a;
    border:1px solid #262626;
}
</style>

<h1 class="text-4xl font-bold mb-8">Recibo</h1>

<div class="max-w-4xl mx-auto">

<div class="card rounded-lg p-8">

<!-- 🔥 HEADER RECIBO -->
<div class="flex justify-between border-b border-[#262626] pb-4 mb-6">

<div>
<h2 class="text-xl font-bold text-[#ffd709]">Macuin Autopartes</h2>
<p class="text-sm text-gray-400">Querétaro, México</p>
</div>

<div class="text-right">
<p class="text-sm text-gray-400">Recibo</p>
<p class="font-bold text-lg">#<span id="orden">0001</span></p>
</div>

</div>

<!-- 🔥 INFO -->
<div class="flex justify-between mb-6 text-sm">

<div>
<p class="text-gray-400">Cliente</p>
<p class="font-semibold">Taller Vega</p>
</div>

<div class="text-right">
<p class="text-gray-400">Fecha</p>
<p id="fecha"></p>
</div>

</div>

<!-- 🔥 PRODUCTOS -->
<table class="w-full text-sm">

<thead>
<tr class="border-b border-[#262626] text-gray-400 text-xs">
<th class="text-left py-2">Producto</th>
<th class="text-center">Cant.</th>
<th class="text-right">Total</th>
</tr>
</thead>

<tbody id="productos"></tbody>

</table>

<!-- 🔥 TOTALES -->
<div class="mt-6 border-t border-[#262626] pt-4">

<div class="flex justify-between text-sm">
<span class="text-gray-400">Subtotal</span>
<span id="subtotal">$0</span>
</div>

<div class="flex justify-between text-sm">
<span class="text-gray-400">IVA (16%)</span>
<span id="iva">$0</span>
</div>

<div class="flex justify-between text-xl font-bold mt-2">
<span>Total</span>
<span class="text-[#ffd709]" id="total">$0</span>
</div>

</div>

<!-- 🔥 ACCIONES -->
<div class="flex gap-4 mt-6">

<button onclick="window.print()" 
class="flex-1 bg-[#ffd709] text-black py-3 rounded font-bold hover:bg-yellow-400 flex justify-center gap-2">
<span class="material-symbols-outlined">print</span>
Imprimir
</button>

<button onclick="finalizar()" 
class="flex-1 border border-[#262626] py-3 rounded hover:bg-[#20201f] flex justify-center gap-2">
<span class="material-symbols-outlined">check</span>
Finalizar
</button>

</div>

<p class="text-center text-xs text-gray-500 mt-6">
Este documento es una representación digital del pedido.
</p>

</div>

</div>

<script>

// 🔥 FECHA ACTUAL
let hoy = new Date();
document.getElementById("fecha").innerText =
    hoy.toLocaleDateString() + " " + hoy.toLocaleTimeString();

// 🔥 NÚMERO RANDOM DE ORDEN
document.getElementById("orden").innerText = Math.floor(Math.random()*10000);

// 🔥 CARGAR PRODUCTOS
function cargarRecibo(){

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    let contenedor = document.getElementById("productos");

    let subtotal = 0;

    contenedor.innerHTML = "";

    carrito.forEach(p=>{

        let totalProducto = p.precio * p.cantidad;
        subtotal += totalProducto;

        contenedor.innerHTML += `
        <tr class="border-b border-[#262626]">
            <td class="py-3">${p.nombre}</td>
            <td class="text-center">${p.cantidad}</td>
            <td class="text-right">$${totalProducto.toFixed(2)}</td>
        </tr>
        `;
    });

    let iva = subtotal * 0.16;
    let total = subtotal + iva;

    document.getElementById("subtotal").innerText = "$" + subtotal.toFixed(2);
    document.getElementById("iva").innerText = "$" + iva.toFixed(2);
    document.getElementById("total").innerText = "$" + total.toFixed(2);
}

// 🔥 FINALIZAR COMPRA
function finalizar(){
    localStorage.removeItem("carrito");
    window.location.href = "/inicio";
}

cargarRecibo();

</script>

{% endblock %}
