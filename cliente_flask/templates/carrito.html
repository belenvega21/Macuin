<!DOCTYPE html>
<html lang="es" class="dark">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito | Macuin Autopartes</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

body{
font-family:'Space Grotesk',sans-serif;
background:#140909;
color:white;
}

.cart-item:hover{
box-shadow:0 0 15px rgba(255,0,0,.3);
transition:.25s;
}

</style>

</head>


<body>


<!-- HEADER -->

<header class="sticky top-0 z-50 bg-[#1d0d0d] border-b border-red-900 px-6 py-4">

<div class="flex justify-between items-center">

<h1 class="text-lg font-bold">
Macuin <span class="text-red-600">Autopartes</span>
</h1>

<div class="flex items-center gap-2">

<span class="text-xs text-gray-400">
Taller Vega
</span>

<span class="material-symbols-outlined text-red-600">
person
</span>

</div>

</div>


<div class="flex justify-between items-center mt-4">

<div class="flex items-center gap-2">

<a href="/catalogo" class="material-symbols-outlined bg-[#2d1616] border border-red-900 rounded p-1 hover:bg-red-600">
arrow_back
</a>

<h2 class="font-bold text-lg">
Tu carrito <span class="text-red-600">(3)</span>

</div>

<button class="text-xs text-gray-400 hover:text-red-500 flex items-center gap-1">

<p class="font-bold mt-1">
$619.00
</p>

</div>

<div class="flex items-center gap-2">

-

<span>
1

+
</button>

</div>

</div>



<!-- ITEM 2 -->

<div class="cart-item bg-[#2d1616] border border-red-900 rounded-lg p-4 flex gap-4 items-center">

<img src="{{ url_for('static', filename='img/alternador.jpeg') }}" class="h-20 w-20 object-contain bg-black p-2 rounded">

<div class="flex-1">

<p class="text-xs text-gray-400">
ID: PZ-4003
</p>

<h3 class="font-semibold">
Alternador 12V Remanufacturado

<p class="font-bold mt-1">
$2,829.00

</div>

<span>
1

+
</button>

</div>

</div>



<!-- ITEM 3 -->

<div class="cart-item bg-[#2d1616] border border-red-900 rounded-lg p-4 flex gap-4 items-center">

<img src="{{ url_for('static', filename='img/amortiguador.jpeg') }}" class="h-20 w-20 object-contain bg-black p-2 rounded">

<div class="flex-1">

<p class="text-xs text-gray-400">
ID: PZ-4004
</p>

<h3 class="font-semibold">
Amortiguador Trasero
</h3>

<p class="font-bold mt-1">
$1,799.00
</p>

</div>

<div class="flex items-center gap-2">

<button class="bg-black border border-red-900 w-8 h-8 flex justify-center items-center rounded">
-
</button>

<span>
1
</span>

<button class="bg-black border border-red-900 w-8 h-8 flex justify-center items-center rounded">
+
</button>

</div>

</div>



<!-- RESUMEN -->

<div class="bg-[#1d0d0d] border border-red-900 rounded-lg p-6 mt-8">

<div class="space-y-2 text-sm">

<div class="flex justify-between">
<span class="text-gray-400">
Subtotal
</span>
<span>
$5,247.00
</span>
</div>

<div class="flex justify-between">
<span class="text-gray-400">
IVA (16%)
</span>
<span>
$839.52
</span>
</div>

</div>


<div class="flex justify-between mt-4 text-xl font-bold">

</span>

<span class="text-red-500">
$6,086.52
</span>

</div>


<button class="w-full mt-6 bg-red-600 hover:bg-red-700 py-3 rounded font-semibold flex justify-center gap-2">

arrow_forward
</span>

</button>
