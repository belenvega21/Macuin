{% extends "base.html" %}

{% block content %}

<style>
.card{
    background:#1a1a1a;
    border:1px solid #262626;
}

.card:hover{
    box-shadow:0 0 20px rgba(255,215,9,0.2);
}
</style>

<h1 class="text-4xl font-bold mb-8">Historial de pedidos</h1>

<div class="grid lg:grid-cols-3 gap-10">

<div class="space-y-6">

    <div class="card p-6 rounded-lg">
        <h3 class="font-bold mb-4">Filtrar</h3>

        <p class="text-sm text-gray-400 mb-2">Estado</p>

        <div class="space-y-2 text-sm">
            <label class="flex gap-2">
                <input type="checkbox"> En camino
            </label>
            <label class="flex gap-2">
                <input type="checkbox"> Entregado
            </label>
            <label class="flex gap-2">
                <input type="checkbox"> Cancelado
            </label>
        </div>
    </div>

</div>

<div class="lg:col-span-2 space-y-4">

    <!-- PEDIDO -->
    <div class="card p-6 rounded-lg flex justify-between items-center">

        <div>
            <p class="text-sm text-gray-400">PEDIDO #12345</p>
            <p class="text-xs text-gray-500">25/01/2026</p>
        </div>

        <span class="bg-blue-900 text-blue-400 text-xs px-3 py-1 rounded">
            En camino
        </span>

        <p class="text-lg font-bold text-[#ffd709]">
            $3,712
        </p>

        <button class="bg-[#20201f] px-4 py-2 rounded hover:bg-[#ffd709] hover:text-black">
            Ver
        </button>

    </div>

    <!-- ENTREGADO -->
    <div class="card p-6 rounded-lg flex justify-between items-center">

        <div>
            <p class="text-sm text-gray-400">PEDIDO #11892</p>
            <p class="text-xs text-gray-500">10/01/2026</p>
        </div>

        <span class="bg-green-900 text-green-400 text-xs px-3 py-1 rounded">
            Entregado
        </span>

        <p class="text-lg font-bold text-[#ffd709]">
            $1,250
        </p>

        <button class="bg-[#20201f] px-4 py-2 rounded hover:bg-[#ffd709] hover:text-black">
            Ver
        </button>

    </div>

    <!-- CANCELADO -->
    <div class="card p-6 rounded-lg flex justify-between items-center opacity-60">

        <div>
            <p class="text-sm text-gray-400">PEDIDO #10550</p>
            <p class="text-xs text-gray-500">01/01/2026</p>
        </div>

        <span class="bg-red-900 text-red-400 text-xs px-3 py-1 rounded">
            Cancelado
        </span>

        <p class="text-lg font-bold text-gray-500 line-through">
            $850
        </p>

        <button class="bg-[#20201f] px-4 py-2 rounded">
            Ver
        </button>

    </div>

</div>

</div>

{% endblock %}
