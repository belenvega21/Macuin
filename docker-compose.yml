services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: macuin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./api_fastapi
    ports:
      - "8001:8000"
    depends_on:
      - db
    volumes:
      - ./cliente_flask/static:/app/static        # ✨ Modificado para apuntar a la carpeta real
      - ./cliente_flask/templates:/app/templates  # ✨ Modificado para apuntar a la carpeta real

  cliente:
    build: ./cliente_flask
    ports:
      - "5001:5000"
    volumes:
      - ./cliente_flask:/app

  admin:
    build: ./admin_laravel
    ports:
      - "8002:80"

volumes:
  postgres_data: